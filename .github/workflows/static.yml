      <div class="nav-item" id="nav-reports" onclick="showPanel('reports')"><span class="nav-icon">📈</span> Reports</div>

      <div class="nav-sec" style="margin-top:8px">System</div>
      <div class="nav-item" id="nav-settings" onclick="showPanel('settings')"><span class="nav-icon">⚙️</span> Settings</div>

      <div class="sb-footer">
        <div class="sb-build">
          <strong>ClaimSync v3.0</strong>
          Full Interactive Mockup<br>
          © 2026 Big O Projects (Pty) Ltd
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content" id="main-content">

<!-- ════════════════════════════════════════
     DASHBOARD
════════════════════════════════════════ -->
<div class="panel active" id="panel-dashboard">
  <div class="ph">
    <div>
      <div class="ph-title" id="dash-greet">Good day, Norman 👋</div>
