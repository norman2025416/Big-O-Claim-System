name: Deploy ClaimSync to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: ./   # adjust if your index.html is in /docs or /public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
