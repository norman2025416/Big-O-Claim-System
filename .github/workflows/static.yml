name: Deploy ClaimSync to GitHub Pages

on:
  push:
    branches:
      - main   # Run this workflow whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # If you have a build step (like npm run build), add it here.
      # For pure HTML/CSS/JS mockups, you can skip straight to deploy.

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public   # Change this if your index.html is in root
