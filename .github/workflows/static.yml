function fmtR(n) { return 'R ' + Number(n).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function statusBadge(s) {
  const m = {Paid:'b-paid',Outstanding:'b-outstanding',Draft:'b-draft',Sent:'b-sent',Void:'b-void','In Progress':'b-progress',Assigned:'b-medium',New:'b-new',Invoiced:'b-done',Completed:'b-done'};
  return `<span class="badge ${m[s]||'b-draft'}">${s}</span>`;
}

function renderDashRecent() {
  const tbody = document.getElementById('dash-recent');
  if (!tbody) return;
  const rows = [...INVOICES_BIGO.slice(0,5), ...INVOICES_PHA.slice(0,3)];
  tbody.innerHTML = rows.map(inv => {
    const isBigo = INVOICES_BIGO.some(x => x.no === inv.no);
    return `<tr onclick="showPanel('invoices')">
      <td class="mono td-bold">BIG O-${inv.no}</td>
      <td>${inv.client}</td>
      <td class="mono td-muted" style="font-size:11px">${inv.claim}</td>
      <td>${inv.date}</td>
      <td class="mono td-bold" style="color:${inv.status==='Outstanding'?'var(--red)':''}">${fmtR(inv.incl)}</td>
      <td>${statusBadge(inv.status)}</td>
      <td><span class="badge ${isBigo?'b-navy':'b-purple'}">${isBigo?'Bigo':'Phahamo'}</span></td>
    </tr>`;
  }).join('');
}

