<!-- ════════════════════════════════════════
     QUOTES
════════════════════════════════════════ -->
<div class="panel" id="panel-quotes">
  <div class="ph">
    <div><div class="ph-title">Quotes</div><div class="ph-sub">Create, send and convert quotes to invoices</div></div>
    <div class="ph-actions">
      <button class="btn btn-ghost btn-sm" onclick="mockAction('Export quotes')">⬇ Export</button>
      <button class="btn btn-gold btn-sm" onclick="openModal('modal-quote')">+ Create Quote</button>
    </div>
  </div>
  <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
    <div class="stat"><div class="sl">Total Quotes</div><div class="sv">7</div><div class="ss">This month</div></div>
    <div class="stat s-amber"><div class="sl">Pending</div><div class="sv">3</div><div class="ss">Awaiting response</div></div>
    <div class="stat s-green"><div class="sl">Accepted</div><div class="sv">3</div><div class="ss">Converted to invoice</div></div>
    <div class="stat s-red"><div class="sl">Declined</div><div class="sv">1</div><div class="ss">No action needed</div></div>
