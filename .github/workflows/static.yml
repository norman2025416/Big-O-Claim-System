/* ── DEVICE DETECTION ── */
function detectDevice() {
  const w = window.innerWidth;
  const badge = document.getElementById('device-badge');
  if (w <= 600) {
    badge.style.display = 'block';
    badge.textContent = '📱 Mobile View';
  } else if (w <= 960) {
    badge.style.display = 'block';
    badge.textContent = '📱 Tablet View';
    setTimeout(() => { badge.style.display = 'none'; }, 3000);
  } else {
    badge.style.display = 'none';
  }
}
window.addEventListener('resize', detectDevice);

/* ── AUTH ── */
function quickLogin(type) {
  const u = USERS.find(x => x.type === type);
  document.getElementById('login-email').value = u.email;
  document.getElementById('login-password').value = u.password;
  doLogin();
}

function doLogin() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const pass  = document.getElementById('login-password').value;
  const user  = USERS.find(u => u.email === email && u.password === pass);
  if (!user) { document.getElementById('login-err').classList.add('show'); return; }
  document.getElementById('login-err').classList.remove('show');
  currentUser = user;
  document.getElementById('tb-av').textContent   = user.initials;
  document.getElementById('tb-name').textContent = user.name;
  document.getElementById('tb-role').textContent = user.role;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('on');
  const h = new Date().getHours();
  const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('dash-greet').textContent = `${g}, ${user.name} 👋`;
  detectDevice();
  initCharts();
  renderDashRecent();
  renderInvoiceTables();
  renderClaimsTable();
  showToast(`👋 Welcome back, ${user.name}!`, 'ok');
}

function doLogout() {
  currentUser = null;
  document.getElementById('app').classList.remove('on');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('user-dd').classList.remove('open');
  closeSidebar();
}

/* ── USER DROPDOWN ── */
function toggleDD() { document.getElementById('user-dd').classList.toggle('open'); }
function closeDD() { document.getElementById('user-dd').classList.remove('open'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.tb-user')) closeDD();
});

/* ── SIDEBAR TOGGLE (mobile/tablet) ── */
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

/* ── PANEL NAVIGATION ── */
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.mob-nav-item').forEach(n => n.classList.remove('active'));
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  const nav = document.getElementById('nav-' + id);
  if (nav) nav.classList.add('active');
  const mnav = document.getElementById('mnav-' + id);
  if (mnav) mnav.classList.add('active');
  const mc = document.getElementById('main-content');
  if (mc) mc.scrollTop = 0;
  closeDD();
  closeSidebar();
  // scroll to top on mobile
  if (window.innerWidth <= 600) window.scrollTo(0, 0);
}

/* ── TAB SWITCHING ── */
function switchTab(el, show, hide) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const showEl = document.getElementById(show);
  const hideEl = document.getElementById(hide);
  if (showEl) showEl.style.display = '';
  if (hideEl) hideEl.style.display = 'none';
}

function switchAccTab(el, show) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['acc-coa','acc-journals','acc-ledger','acc-trial'].forEach(id => {
    const el2 = document.getElementById(id);
    if (el2) el2.style.display = id === show ? '' : 'none';
  });
}

function switchSettingsTab(el, show) {
  el.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['set-company','set-integrations','set-users','set-billing'].forEach(id => {
    const el2 = document.getElementById(id);
    if (el2) el2.style.display = id === show ? '' : 'none';
  });
}

