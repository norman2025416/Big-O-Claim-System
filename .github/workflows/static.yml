    <td>${i+1}</td><td class="mono td-bold">BIG O-${inv.no}</td><td>${inv.client}</td>
    <td class="mono td-muted" style="font-size:11px">${inv.claim}</td><td>${inv.date}</td>
    <td class="mono td-bold" style="color:${inv.status==='Outstanding'?'var(--red)':''}">${fmtR(inv.incl)}</td>
    <td>${statusBadge(inv.status)}</td>
    <td><button class="btn btn-ghost btn-xs" onclick="mockAction('View ${inv.no}')">View</button></td>
  </tr>`).join('');
  if (tbody2) tbody2.innerHTML = INVOICES_PHA.map((inv,i) => `<tr>
    <td>${i+1}</td><td class="mono td-bold">BIG O-${inv.no}</td><td>${inv.client}</td>
    <td class="mono td-muted" style="font-size:11px">${inv.claim}</td><td>${inv.date}</td>
    <td class="mono td-bold">${fmtR(inv.incl)}</td>
    <td>${statusBadge(inv.status)}</td>
    <td><button class="btn btn-ghost btn-xs" onclick="mockAction('View ${inv.no}')">View</button></td>
  </tr>`).join('');
}

function renderClaimsTable() {
  const tbody = document.getElementById('claims-tbody');
  if (!tbody) return;
  tbody.innerHTML = CLAIMS_DATA.map((c,i) => `<tr>
    <td>${i+1}</td>
    <td class="mono td-bold" style="font-size:11px">${c.ref}</td>
    <td>${c.client}</td>
    <td style="font-size:11.5px;color:var(--muted)">${c.address}</td>
    <td>${c.peril}</td><td>${c.assessor}</td>
    <td><span class="badge ${c.entity==='BIGO'?'b-navy':'b-purple'}">${c.entity}</span></td>
    <td>${statusBadge(c.status)}</td>
    <td><div style="display:flex;gap:4px">
      <button class="btn btn-ghost btn-xs" onclick="mockAction('View ${c.ref}')">View</button>
      <button class="btn btn-ghost btn-xs" onclick="showPanel('invoices')">Invoice</button>
    </div></td>
  </tr>`).join('');
}

/* ── CHARTS ── */
let chartsInitialised = false;
function initCharts() {
  if (chartsInitialised) return;
  chartsInitialised = true;
  const rc = document.getElementById('chart-revenue');
  if (rc) {
    new Chart(rc, {
      type: 'bar',
      data: {
        labels: ['Jan 2026', 'Feb 2026', 'Mar 2026'],
        datasets: [
          {label:'Bigo Direct',data:[612400,182000,55494],backgroundColor:'rgba(10,45,94,0.85)',borderRadius:6},
          {label:'Phahamo',data:[226134,28438,60093],backgroundColor:'rgba(75,40,135,0.75)',borderRadius:6},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:12}}},scales:{x:{grid:{display:false},ticks:{font:{size:11}}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},callback:v=>'R '+Number(v/1000).toFixed(0)+'k'}}}}
    });
  }
  const ac = document.getElementById('chart-aged');
  if (ac) {
    new Chart(ac, {
      type: 'doughnut',
      data: {
        labels: ['Current (0-30d)','31-60 days','61-90 days','90+ days'],
        datasets:[{data:[1158295,6264,0,0],backgroundColor:['rgba(26,122,74,0.8)','rgba(192,57,43,0.8)','rgba(217,119,6,0.8)','rgba(107,114,128,0.5)'],borderWidth:0}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}}}}
    });
  }
}

/* ── MODALS ── */
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-ov').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
});

function mockSave(modalId, msg) {
  closeModal(modalId);
  showToast('✅ ' + msg, 'ok');
}

function calcModalVAT() {
  const incl = parseFloat(document.getElementById('ni-incl').value) || 0;
  document.getElementById('ni-excl').value = incl ? 'R ' + (incl/1.15).toFixed(2) : '';
}

/* ── CLIENT TYPE SELECTOR ── */
function setClientType(type) {
  const sub = document.getElementById('ct-sub');
  const sup = document.getElementById('ct-sup');
  if (type === 'Subcontractor') {
    sub.style.borderColor='var(--purple)'; sub.style.background='var(--purple-l)';
    sup.style.borderColor='var(--border-md)'; sup.style.background='';
  } else {
    sup.style.borderColor='var(--teal)'; sup.style.background='var(--teal-l)';
    sub.style.borderColor='var(--border-md)'; sub.style.background='';
  }
}

/* ── TABLE FILTER ── */
function filterTable(tblId, q) {
  const tbl = document.getElementById(tblId);
  if (!tbl) return;
  const rows = tbl.querySelectorAll('tbody tr');
  const lower = q.toLowerCase();
  rows.forEach(r => { r.style.display = r.textContent.toLowerCase().includes(lower) ? '' : 'none'; });
}

/* ── MOCK ACTIONS ── */
function mockAction(label) { showToast('⚡ ' + label + ' (mock)', 'inf'); }
function mockOCR() { showToast('📷 OCR scanning receipt... AI extracted: Builders Warehouse · R 2,340.00 · VAT R 304.35', 'ok'); }
function triggerSync() {
  document.getElementById('sync-lbl').textContent = 'Syncing...';
  setTimeout(() => { document.getElementById('sync-lbl').textContent = 'Online — Synced'; showToast('🔄 Zoho sync complete · 83 invoices reconciled', 'ok'); }, 1800);
}

/* ── TOAST ── */
function showToast(msg, type='inf') {
  const wrap = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'toastOut .3s ease forwards';
    setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 300);
  }, 4000);
}

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-ov.open').forEach(m => m.classList.remove('open'));
    closeSidebar();
    closeDD();
  }
});

/* ── INIT ── */
detectDevice();
</script>
</body>
