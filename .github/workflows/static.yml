
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ClaimSync v3.0 — Big O Projects (Pty) Ltd</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   CLAIMSYNC v3.0 — CSS DESIGN SYSTEM
   © 2026 Big O Projects (Pty) Ltd
═══════════════════════════════════════════ */
:root{
  --navy:#0A2D5E;--navy-l:#1A4A8A;--navy-d:#071D3E;
  --gold:#C9982A;--gold-l:#F5C842;--gold-p:#FEF8E7;
  --teal:#0F5F5A;--teal-l:#E8F3F2;
  --purple:#4B2887;--purple-l:#F3EEFF;
  --green:#1A7A4A;--green-l:#22C55E;--green-p:#E8F7EF;
  --red:#C0392B;--red-p:#FFF5F5;
  --amber:#D97706;--amber-p:#FEF3C7;
  --blue:#1D4ED8;--blue-p:#EFF6FF;
  --bg:#F0F2F7;--card:#FFFFFF;--border:rgba(0,0,0,0.07);--border-md:#E5E7EB;
  --text:#111827;--muted:#6B7280;
  --sidebar-w:252px;--topbar-h:52px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --shadow:0 2px 12px rgba(10,45,94,0.08);--shadow-lg:0 8px 32px rgba(10,45,94,0.14);
  --radius:12px;--radius-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.14);border-radius:4px}

/* ── AUTH ── */
#auth-screen{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;align-items:center;justify-content:center;overflow:auto;padding:16px}
.auth-bg-hex{position:absolute;font-size:300px;line-height:1;color:rgba(255,255,255,0.025);user-select:none;pointer-events:none}
.auth-card{position:relative;z-index:2;background:white;border-radius:20px;width:420px;max-width:100%;box-shadow:0 40px 80px rgba(0,0,0,0.35);overflow:hidden;animation:authUp .4s cubic-bezier(.22,1,.36,1)}
@keyframes authUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.auth-hdr{background:var(--navy);padding:28px 32px 24px;text-align:center}
.auth-logo{font-size:26px;font-weight:700;color:white;letter-spacing:-.5px;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px}
.auth-logo .hex{color:var(--gold)}
.auth-tagline{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase}
.auth-body{padding:28px 32px 32px}
.auth-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.auth-sub{font-size:12px;color:var(--muted);margin-bottom:24px}
.auth-quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.auth-quick-btn{padding:14px 10px;border:none;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:var(--font);font-size:13px;font-weight:700;transition:all .15s}
.auth-quick-btn.admin{background:var(--navy);color:white}
.auth-quick-btn.admin:hover{background:var(--navy-l)}
.auth-quick-btn.field{background:var(--gold);color:var(--navy-d)}
.auth-quick-btn.field:hover{background:var(--gold-l)}
.auth-quick-btn span{font-size:22px}
.auth-quick-btn small{font-size:10px;opacity:.75;font-weight:400}
.auth-divider{display:flex;align-items:center;gap:10px;margin-bottom:18px;color:var(--muted);font-size:11px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;border-top:1px solid var(--border-md)}
.auth-fg{margin-bottom:16px}
.auth-label{display:block;font-size:11px;font-weight:600;color:var(--text);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.auth-input{width:100%;padding:10px 14px;border:1.5px solid var(--border-md);border-radius:var(--radius-sm);font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s}
.auth-input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,45,94,.1)}
.auth-btn{width:100%;padding:12px;background:var(--navy);color:white;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:8px}
.auth-btn:hover{background:var(--navy-l);transform:translateY(-1px);box-shadow:0 4px 16px rgba(10,45,94,.25)}
.auth-err{background:var(--red-p);border:1px solid rgba(192,57,43,.25);color:var(--red);font-size:12px;padding:8px 12px;border-radius:6px;margin-top:10px;display:none}
.auth-err.show{display:block}
.auth-trust{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.auth-trust span{font-size:10px;color:var(--muted)}

/* ── SHELL ── */
#app{display:none;flex-direction:column;height:100%}
#app.on{display:flex}

/* ── TOPBAR ── */
.topbar{height:var(--topbar-h);background:var(--navy);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.05)}
.tb-hamburger{display:none;background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:background .15s;flex-shrink:0}
.tb-hamburger:hover{background:rgba(255,255,255,.1)}
.tb-logo{font-size:16px;font-weight:700;color:white;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.tb-logo .hex{color:var(--gold)}
.tb-badge{background:rgba(201,152,42,.2);color:var(--gold);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:20px;border:1px solid rgba(201,152,42,.3)}
.tb-spacer{flex:1}
.tb-sync{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22C55E;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-user{display:flex;align-items:center;gap:9px;cursor:pointer;padding:5px 8px;border-radius:8px;transition:background .15s;position:relative}
.tb-user:hover{background:rgba(255,255,255,.08)}
.tb-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-name{font-size:12px;color:rgba(255,255,255,.85);font-weight:600;line-height:1.2}
.tb-role{font-size:10px;color:rgba(255,255,255,.4)}
.user-dd{position:absolute;top:calc(100% + 8px);right:0;background:white;border-radius:10px;box-shadow:var(--shadow-lg);width:190px;z-index:500;border:1px solid var(--border);display:none;overflow:hidden;animation:ddDown .15s ease}
@keyframes ddDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.user-dd.open{display:block}
.dd-item{padding:10px 16px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s}
.dd-item:hover{background:var(--bg)}
.dd-item.danger{color:var(--red)}
.dd-div{border:none;border-top:1px solid var(--border-md);margin:0;padding:0}

/* ── LAYOUT ── */
.main-wrap{display:flex;flex:1;overflow:hidden;position:relative}

/* ── SIDEBAR OVERLAY (mobile) ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;backdrop-filter:blur(2px)}
.sidebar-overlay.open{display:block}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--navy);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;padding:10px 0;transition:transform .25s cubic-bezier(.22,1,.36,1);z-index:201}
.sidebar::-webkit-scrollbar{width:0}
.nav-sec{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:12px 18px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:all .14s;color:rgba(255,255,255,.5);font-size:12.5px;font-weight:500;position:relative;margin:1px 8px;border-radius:8px}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(201,152,42,.15);color:var(--gold)}
.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center}
.nb-red{background:var(--red);color:white}
.nb-gold{background:var(--gold);color:var(--navy-d)}
.nb-green{background:var(--green);color:white}
.nb-teal{background:var(--teal);color:white}
.nb-blue{background:var(--blue);color:white}
.sb-footer{margin-top:auto;padding:10px 8px;border-top:1px solid rgba(255,255,255,.07)}
.sb-build{margin:8px 16px;padding:8px 12px;background:rgba(201,152,42,.12);border:1px solid rgba(201,152,42,.2);border-radius:8px;font-size:10px;color:rgba(255,255,255,.5);line-height:1.5}
.sb-build strong{color:var(--gold);display:block;font-size:11px;margin-bottom:2px}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:22px 24px;display:flex;flex-direction:column;gap:18px}
.panel{display:none;flex-direction:column;gap:18px;animation:fadeIn .18s ease}
.panel.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ph-title{font-size:21px;font-weight:700;letter-spacing:-.5px;color:var(--navy)}
.ph-sub{font-size:12px;color:var(--muted);margin-top:3px}
.ph-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* ── CARDS ── */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.card-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card-body{padding:16px 18px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .14s;white-space:nowrap}
.btn-navy{background:var(--navy);color:white;border-color:var(--navy)}
.btn-navy:hover{background:var(--navy-l);transform:translateY(-1px);box-shadow:0 4px 12px rgba(10,45,94,.2)}
.btn-gold{background:var(--gold);color:var(--navy-d);border-color:var(--gold)}
.btn-gold:hover{background:var(--gold-l)}
.btn-ghost{background:white;color:var(--text);border-color:var(--border-md)}
.btn-ghost:hover{background:var(--bg)}
.btn-green{background:var(--green);color:white;border-color:var(--green)}
.btn-red{background:var(--red);color:white;border-color:var(--red)}
.btn-teal{background:var(--teal);color:white;border-color:var(--teal)}
.btn-amber{background:var(--amber);color:white;border-color:var(--amber)}
.btn-sm{padding:6px 12px;font-size:11.5px}
.btn-xs{padding:4px 9px;font-size:10.5px}
.btn-full{width:100%;justify-content:center}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.stat{background:var(--card);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;cursor:default}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat.s-navy{background:var(--navy)}.stat.s-gold{background:linear-gradient(135deg,#B8831F,var(--gold))}
.stat.s-teal{background:var(--teal)}.stat.s-green{background:var(--green)}
.stat.s-red{background:var(--red)}.stat.s-amber{background:var(--amber)}
.stat.s-blue{background:var(--blue)}
.stat.s-navy .sl,.stat.s-gold .sl,.stat.s-teal .sl,.stat.s-green .sl,.stat.s-red .sl,.stat.s-amber .sl,.stat.s-blue .sl{color:rgba(255,255,255,.65)}
.stat.s-navy .sv,.stat.s-gold .sv,.stat.s-teal .sv,.stat.s-green .sv,.stat.s-red .sv,.stat.s-amber .sv,.stat.s-blue .sv{color:white}
.stat.s-navy .ss,.stat.s-gold .ss,.stat.s-teal .ss,.stat.s-green .ss,.stat.s-red .ss,.stat.s-amber .ss,.stat.s-blue .ss{color:rgba(255,255,255,.45)}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.sv{font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--navy);font-family:var(--mono)}
.ss{font-size:11px;color:var(--muted);margin-top:5px}
.si{position:absolute;right:14px;top:14px;font-size:20px;opacity:.45}

/* ── TABLES ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead tr{background:#F4F5F9}
.tbl th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:1px solid var(--border-md);white-space:nowrap;position:sticky;top:0;background:#F4F5F9;z-index:2}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tbody tr{cursor:pointer;transition:background .1s}
.tbl tbody tr:hover{background:#F8F9FC}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.b-paid{background:var(--green-p);color:var(--green)}
.b-outstanding{background:var(--red-p);color:var(--red)}
.b-draft{background:#F3F4F6;color:var(--muted)}
.b-sent{background:var(--blue-p);color:var(--blue)}
.b-void{background:#F3F4F6;color:#9CA3AF}
.b-active{background:var(--green-p);color:var(--green)}
.b-new{background:var(--blue-p);color:var(--blue)}
.b-progress{background:#EDE9FE;color:#6D28D9}
.b-done{background:var(--green-p);color:var(--green)}
.b-high{background:var(--red-p);color:var(--red)}
.b-medium{background:var(--amber-p);color:var(--amber)}
.b-low{background:var(--green-p);color:var(--green)}
.b-navy{background:#EAF0FB;color:var(--navy)}
.b-purple{background:var(--purple-l);color:var(--purple)}
.b-teal{background:var(--teal-l);color:var(--teal)}
.b-green{background:var(--green-p);color:var(--green)}
.b-amber{background:var(--amber-p);color:var(--amber)}
.b-red{background:var(--red-p);color:var(--red)}
.b-coming{background:#F3F4F6;color:var(--muted)}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:10.5px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.fi{border:1.5px solid var(--border-md);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:var(--font);color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;background:white;width:100%}
.fi:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(10,45,94,.1)}
.fi[readonly]{background:var(--bg);color:var(--muted)}
textarea.fi{resize:vertical}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrid .full{grid-column:span 2}
.filter-bar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:#FAFBFD}
.fi-search{border:1.5px solid var(--border-md);border-radius:var(--radius-sm);padding:7px 12px;font-size:12.5px;font-family:var(--font);background:white;outline:none;transition:border-color .15s;color:var(--text);flex:1;min-width:150px}
.fi-search:focus{border-color:var(--navy)}
.fi-sel{border:1.5px solid var(--border-md);border-radius:var(--radius-sm);padding:7px 12px;font-size:12.5px;font-family:var(--font);background:white;outline:none;color:var(--text)}

/* ── ALERT BOXES ── */
.alert{padding:14px 18px;border-radius:var(--radius-sm);display:flex;align-items:flex-start;gap:12px;font-size:12.5px}
.alert.warn{background:var(--red-p);border:1.5px solid rgba(192,57,43,.2)}
.alert.ok{background:var(--green-p);border:1.5px solid rgba(26,122,74,.2)}
.alert.info{background:var(--blue-p);border:1.5px solid rgba(37,99,235,.15)}
.alert.amber{background:var(--amber-p);border:1.5px solid rgba(217,119,6,.2)}
.alert-icon{font-size:20px;flex-shrink:0;line-height:1;margin-top:1px}
.alert-title{font-weight:700;color:var(--navy);margin-bottom:3px}
.alert-body{font-size:12px;color:var(--text);line-height:1.5}
.alert-actions{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}

/* ── MODALS ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:16px}
.modal-ov.open{display:flex}
.modal{background:white;border-radius:16px;box-shadow:var(--shadow-lg);width:560px;max-width:100%;max-height:calc(100vh - 32px);display:flex;flex-direction:column;animation:mslide .2s ease}
.modal-lg{width:760px}
@keyframes mslide{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.modal-hdr{padding:18px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:0}
.modal-close:hover{color:var(--text)}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0;flex-wrap:wrap}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9990;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1F2937;color:white;padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;max-width:340px;pointer-events:auto}
.toast.ok{background:#065F46;border-left:3px solid var(--green-l)}
.toast.err{background:#7F1D1D;border-left:3px solid var(--red)}
.toast.inf{background:#1E3A5F;border-left:3px solid #60A5FA}
.toast.warn{background:#78350F;border-left:3px solid var(--amber)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
@keyframes toastOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(20px)}}

/* ── MISC ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.pb{background:rgba(0,0,0,.07);border-radius:4px;height:6px;overflow:hidden}
.pb-fill{height:100%;border-radius:4px;transition:width .4s ease}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border-md);overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{height:0}
.tab{padding:9px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.chart-wrap{position:relative;height:220px}
.empty{text-align:center;padding:40px 24px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}
.section-banner{padding:10px 14px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px}
.sb-navy{background:var(--navy);color:white}
.sb-purple{background:var(--purple);color:white}
.sb-dark{background:var(--navy-d);color:rgba(255,255,255,.8)}
.mono{font-family:var(--mono)}
.td-bold{font-weight:700}
.td-muted{color:var(--muted)}
.vat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12.5px;gap:8px}
.vat-row.total{background:#F4F5F9;font-weight:700;font-size:13px}
.coming-soon{background:var(--amber-p);border:1px solid rgba(217,119,6,.2);border-radius:var(--radius);padding:24px;text-align:center}
.coming-icon{font-size:40px;margin-bottom:12px}
.coming-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:6px}
.coming-body{font-size:12.5px;color:var(--muted);max-width:360px;margin:0 auto 16px}

/* ═══════════════════════════════════════════
   RESPONSIVE — TABLET (≤ 960px)
═══════════════════════════════════════════ */
@media(max-width:960px){
  :root{--sidebar-w:280px}
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%);z-index:201}
  .sidebar.open{transform:translateX(0)}
  .tb-hamburger{display:flex;align-items:center;justify-content:center}
  .tb-badge{display:none}
  .tb-sync{display:none}
  .content{padding:16px}
  .two-col{grid-template-columns:1fr}
  .three-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
}

/* ═══════════════════════════════════════════
   RESPONSIVE — MOBILE (≤ 600px)
═══════════════════════════════════════════ */
@media(max-width:600px){
  html,body{overflow:auto}
  #app{height:auto;min-height:100%}
  .main-wrap{overflow:visible}
  .content{overflow:visible;padding:12px;gap:12px}
  .ph{flex-direction:column;align-items:flex-start}
  .ph-title{font-size:18px}
  .ph-actions{width:100%}
  .ph-actions .btn{flex:1;justify-content:center;font-size:11px;padding:7px 8px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .sv{font-size:18px}
  .card-hdr{flex-direction:column;align-items:flex-start}
  .card-body{padding:12px}
  .tbl-wrap{max-height:none}
  .filter-bar{gap:8px}
  .fi-search{min-width:100%;flex:none}
  .fgrid{grid-template-columns:1fr}
  .fgrid .full{grid-column:span 1}
  .modal{border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:90vh;width:100%}
  .modal-ov{align-items:flex-end;padding:0}
  .toast-wrap{bottom:12px;right:12px;left:12px}
  .toast{max-width:100%}
  .tb-name,.tb-role{display:none}
  .auth-body{padding:20px}
  .auth-hdr{padding:20px}
  .three-col{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .btn-sm{font-size:11px;padding:5px 10px}
}

/* ═══════════════════════════════════════════
   MOBILE BOTTOM NAV (≤ 600px)
═══════════════════════════════════════════ */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid rgba(255,255,255,.1);z-index:150;padding:6px 0 env(safe-area-inset-bottom,0)}
@media(max-width:600px){
  .mobile-nav{display:flex}
  .content{padding-bottom:80px}
}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;cursor:pointer;color:rgba(255,255,255,.45);transition:color .15s;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.mob-nav-item .m-icon{font-size:18px;line-height:1}
.mob-nav-item.active{color:var(--gold)}

/* ═══════════════════════════════════════════
   DEVICE BADGE (for demo awareness)
═══════════════════════════════════════════ */
.device-badge{display:none;position:fixed;top:60px;right:12px;background:rgba(10,45,94,.9);color:rgba(255,255,255,.7);font-size:9px;font-weight:700;letter-spacing:1px;padding:3px 8px;border-radius:20px;z-index:99;text-transform:uppercase}
@media(max-width:600px){.device-badge{display:block}}
</style>
</head>
<body>

<!-- DEVICE BADGE -->
<div class="device-badge" id="device-badge">📱 Mobile View</div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-bg-hex" style="top:-80px;left:-100px">⬡</div>
  <div class="auth-bg-hex" style="bottom:-100px;right:-80px;font-size:250px">⬡</div>
  <div class="auth-card">
    <div class="auth-hdr">
      <div class="auth-logo"><span class="hex">⬡</span> ClaimSync<span style="color:var(--gold)">.</span></div>
      <div class="auth-tagline">Insurance Field Management Platform</div>
    </div>
    <div class="auth-body">
      <div class="auth-title">Sign In</div>
      <div class="auth-sub">Big O Projects (Pty) Ltd · bigoprojects.co.za</div>
      <div class="auth-quick">
        <button class="auth-quick-btn admin" onclick="quickLogin('admin')">
          <span>🔐</span><strong>Admin Login</strong><small>Full system access</small>
        </button>
        <button class="auth-quick-btn field" onclick="quickLogin('field')">
          <span>🏗️</span><strong>Field Login</strong><small>Field operations</small>
        </button>
      </div>
      <div class="auth-divider">or sign in manually</div>
      <div class="auth-fg">
        <label class="auth-label">Email Address</label>
        <input class="auth-input" type="email" id="login-email" placeholder="you@bigoprojects.co.za" autocomplete="email">
      </div>
      <div class="auth-fg">
        <label class="auth-label">Password</label>
        <input class="auth-input" type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password">
      </div>
      <div class="auth-err" id="login-err">Invalid email or password. Please try again.</div>
      <button class="auth-btn" onclick="doLogin()">Sign In to ClaimSync →</button>
      <div class="auth-trust">
        <span>🔒 SSL Encrypted</span>
        <span>🇿🇦 SA Hosted</span>
        <span>📋 POPIA Compliant</span>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-wrap" id="toasts"></div>

<!-- SIDEBAR OVERLAY (mobile/tablet) -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- APP SHELL -->
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <button class="tb-hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
    <div class="tb-logo" onclick="showPanel('dashboard')">
      <span class="hex">⬡</span> ClaimSync<span style="color:var(--gold)">.</span>
    </div>
    <div class="tb-badge">Big O Projects</div>
    <div class="tb-spacer"></div>
    <div class="tb-sync" onclick="triggerSync()">
      <div class="sync-dot"></div><span id="sync-lbl">Online — Synced</span>
    </div>
    <div class="tb-user" onclick="toggleDD()">
      <div class="tb-avatar" id="tb-av">N</div>
      <div>
        <div class="tb-name" id="tb-name">Norman</div>
        <div class="tb-role" id="tb-role">Administrator</div>
      </div>
      <div class="user-dd" id="user-dd">
        <div class="dd-item" onclick="showPanel('settings');closeDD()">⚙️ Settings</div>
        <div class="dd-item">👤 My Profile</div>
        <div class="dd-item">🔑 Change Password</div>
        <hr class="dd-div">
        <div class="dd-item danger" onclick="doLogout()">🚪 Sign Out</div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="nav-sec">Main</div>
      <div class="nav-item active" id="nav-dashboard" onclick="showPanel('dashboard')"><span class="nav-icon">◈</span> Dashboard</div>
      <div class="nav-item" id="nav-clients" onclick="showPanel('clients')"><span class="nav-icon">👥</span> Clients</div>
      <div class="nav-item" id="nav-quotes" onclick="showPanel('quotes')"><span class="nav-icon">📄</span> Quotes<span class="nav-badge nb-gold">3</span></div>
      <div class="nav-item" id="nav-invoices" onclick="showPanel('invoices')"><span class="nav-icon">🧾</span> Invoices<span class="nav-badge nb-red">1</span></div>
      <div class="nav-item" id="nav-payments" onclick="showPanel('payments')"><span class="nav-icon">💳</span> Payments</div>

      <div class="nav-sec" style="margin-top:8px">Operations</div>
      <div class="nav-item" id="nav-claims" onclick="showPanel('claims')"><span class="nav-icon">📋</span> Claims<span class="nav-badge nb-teal">83</span></div>
      <div class="nav-item" id="nav-field" onclick="showPanel('field')"><span class="nav-icon">🗺️</span> Field</div>
